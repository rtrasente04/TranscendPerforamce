<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcend Performance</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #111827;
    }

    header {
      width: 100%;
      padding: 22px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-weight: 900;
      letter-spacing: 1.5px;
      font-size: 18px;
    }

    nav a {
      margin-left: 24px;
      color: #111827;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    nav a:hover {
      color: #008cff;
    }

    .hero {
      min-height: 88vh;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      align-items: center;
      gap: 50px;
      padding: 80px 8%;
      background:
        radial-gradient(circle at 80% 30%, rgba(0, 140, 255, 0.18), transparent 30%),
        linear-gradient(180deg, #ffffff, #f5f9ff);
    }

    .badge {
      display: inline-block;
      padding: 10px 16px;
      background: #eaf6ff;
      color: #008cff;
      border-radius: 999px;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 1px;
      margin-bottom: 22px;
    }

    h1 {
      font-size: clamp(46px, 7vw, 82px);
      line-height: 0.95;
      margin: 0;
      letter-spacing: -2px;
    }

    .hero p {
      font-size: 20px;
      line-height: 1.6;
      color: #4b5563;
      max-width: 620px;
      margin-top: 24px;
    }

    .buttons {
      margin-top: 34px;
    }

    .btn {
      display: inline-block;
      padding: 15px 28px;
      border-radius: 999px;
      font-weight: 800;
      text-decoration: none;
      margin-right: 12px;
    }

    .primary {
      background: #008cff;
      color: white;
      box-shadow: 0 15px 35px rgba(0, 140, 255, 0.28);
    }

    .secondary {
      color: #111827;
      border: 1px solid #cbd5e1;
      background: white;
    }

    .hero-image {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .image-card {
      background: white;
      border-radius: 34px;
      padding: 35px;
      box-shadow: 0 30px 80px rgba(0, 40, 90, 0.18);
      border: 1px solid #e5eef8;
      position: relative;
    }

    .image-card::before {
      content: "";
      position: absolute;
      inset: -18px;
      background: radial-gradient(circle, rgba(0, 140, 255, 0.22), transparent 60%);
      z-index: -1;
      border-radius: 40px;
    }

    .image-card img {
      width: 100%;
      max-width: 330px;
      border-radius: 24px;
      display: block;
    }

    section {
      padding: 90px 8%;
    }

    .section-heading {
      text-align: center;
      max-width: 760px;
      margin: 0 auto 50px;
    }

    .section-heading h2 {
      font-size: 42px;
      margin-bottom: 14px;
    }

    .section-heading p {
      color: #64748b;
      font-size: 18px;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.06);
      transition: 0.25s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: #008cff;
      box-shadow: 0 24px 60px rgba(0, 140, 255, 0.12);
    }

    .card span {
      color: #008cff;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .card h3 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .card p {
      color: #64748b;
      line-height: 1.6;
    }

    .about {
      background: #f8fbff;
    }

    .contact-box {
      max-width: 760px;
      margin: auto;
      background: #0f172a;
      color: white;
      border-radius: 30px;
      padding: 50px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.25);
    }

    .contact-box p {
      color: #cbd5e1;
      font-size: 18px;
      line-height: 1.6;
    }

    .contact-box a {
      color: #38bdf8;
      font-weight: 800;
      text-decoration: none;
    }

    .disclaimer {
      background: #f1f5f9;
      color: #64748b;
      font-size: 13px;
      line-height: 1.6;
      padding: 35px 8%;
      text-align: center;
    }

    footer {
      padding: 30px 8%;
      text-align: center;
      color: #64748b;
      border-top: 1px solid #e5e7eb;
    }

    @media (max-width: 850px) {
      header {
        flex-direction: column;
        gap: 15px;
      }

      nav a {
        margin: 0 10px;
      }

.hero {
  position: relative;
  overflow: hidden;
  min-height: 95vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 120px 8%;
  background:
    linear-gradient(135deg, #f8fbff 0%, #eef6ff 45%, #ffffff 100%);
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 950px;
}

.hero h1 {
  font-size: clamp(70px, 10vw, 140px);
  line-height: .88;
  margin: 0;
  font-weight: 900;
  letter-spacing: -5px;
  color: #0f172a;
}

.hero p {
  max-width: 760px;
  margin: 30px auto 0;
  font-size: 22px;
  line-height: 1.7;
  color: #475569;
}

.badge {
  display: inline-block;
  margin-bottom: 30px;
  padding: 14px 24px;
  border-radius: 999px;
  background: rgba(0, 140, 255, 0.12);
  border: 1px solid rgba(0, 140, 255, 0.2);
  color: #008cff;
  font-size: 15px;
  font-weight: 900;
  letter-spacing: 2px;
  box-shadow: 0 10px 40px rgba(0,140,255,.12);
}

.bg-glow {
  position: absolute;
  width: 700px;
  height: 700px;
  background: rgba(0, 140, 255, 0.13);
  filter: blur(120px);
  border-radius: 50%;
  top: -180px;
  right: -120px;
}

.bg-glow2 {
  position: absolute;
  width: 500px;
  height: 500px;
  background: rgba(0, 140, 255, 0.08);
  filter: blur(120px);
  border-radius: 50%;
  bottom: -180px;
  left: -120px;
}
